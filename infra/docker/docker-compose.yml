version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: tender_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-tender_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tender_pass}
      POSTGRES_DB: ${DB_NAME:-tender_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tender_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tender_network

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: tender_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tender_network

  # Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.3
    container_name: tender_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - tender_network

  # FastAPI Backend
  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: tender_api
    env_file:
      - ../../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-tender_user}:${DB_PASSWORD:-tender_pass}@postgres:5432/${DB_NAME:-tender_db}
      - REDIS_URL=redis://redis:6379/0
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - ../../apps/api:/app
    networks:
      - tender_network

  # Next.js Frontend
  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    container_name: tender_web
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ../../apps/web:/app
      - /app/node_modules
    networks:
      - tender_network

  # Celery Worker
  worker:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: tender_worker
    command: celery -A src.worker.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - ../../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-tender_user}:${DB_PASSWORD:-tender_pass}@postgres:5432/${DB_NAME:-tender_db}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - postgres
      - redis
    volumes:
      - ../../apps/api:/app
    networks:
      - tender_network

  # Celery Beat (Scheduler)
  celery_beat:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: tender_celery_beat
    command: celery -A src.worker.celery_app beat --loglevel=info
    env_file:
      - ../../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-tender_user}:${DB_PASSWORD:-tender_pass}@postgres:5432/${DB_NAME:-tender_db}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      - redis
    volumes:
      - ../../apps/api:/app
    networks:
      - tender_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: tender_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - web
    networks:
      - tender_network

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:

networks:
  tender_network:
    driver: bridge
